<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>YouTube Sentiment Analyzer</title>


  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
      background:#0f172a;
      color:#e2e8f0;
      width:340px;
      padding:16px;
    }

    /* HEADER */

    .header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:16px;
    }

    .title{
      font-size:18px;
      font-weight:600;
      color:white;
    }

    .badge{
      background:#1e293b;
      padding:4px 8px;
      border-radius:6px;
      font-size:11px;
      color:#38bdf8;
    }

    /* CARD */

    .card{
      background:#1e293b;
      border-radius:10px;
      padding:12px;
      margin-bottom:12px;
      box-shadow:0 4px 14px rgba(0,0,0,0.35);
    }

    .section-title{
      font-size:13px;
      color:#94a3b8;
      margin-bottom:8px;
      text-transform:uppercase;
      letter-spacing:0.6px;
    }

    /* METRICS */

    .metrics{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .metric{
      background:#0f172a;
      padding:10px;
      border-radius:8px;
      text-align:center;
    }

    .metric-value{
      font-size:22px;
      font-weight:700;
      margin-top:4px;
      color:#38bdf8;
    }

    .metric-title{
      font-size:11px;
      color:#94a3b8;
    }

    /* COMMENT LIST */

    .comment-list{
      max-height:160px;
      overflow-y:auto;
      list-style:none;
    }

    .comment-item{
      padding:8px;
      border-radius:6px;
      margin-bottom:6px;
      background:#0f172a;
      font-size:12px;
      line-height:1.4;
    }

    .sentiment{
      font-weight:600;
      margin-top:4px;
      font-size:11px;
    }

    .positive{
      color:#22c55e;
    }

    .negative{
      color:#ef4444;
    }

    .neutral{
      color:#facc15;
    }

    /* IMAGE */

    .chart{
      width:100%;
      border-radius:8px;
      margin-top:8px;
      background:#0f172a;
      padding:6px;
    }

    /* LOADING */

    .loading{
      text-align:center;
      font-size:12px;
      color:#94a3b8;
      padding:12px;
    }

  </style>
</head>

<body>

  <div class="header">
    <div class="title">Comment Insights</div>
    <div class="badge">AI</div>
  </div>

  <!-- Metrics -->
  <div class="card">

    <div class="section-title">Overview</div>

    <div class="metrics">

      <div class="metric">
        <div class="metric-title">Positive</div>
        <div id="positiveCount" class="metric-value">0</div>
      </div>

      <div class="metric">
        <div class="metric-title">Negative</div>
        <div id="negativeCount" class="metric-value">0</div>
      </div>

      <div class="metric">
        <div class="metric-title">Neutral</div>
        <div id="neutralCount" class="metric-value">0</div>
      </div>

      <div class="metric">
        <div class="metric-title">Total</div>
        <div id="totalCount" class="metric-value">0</div>
      </div>

    </div>

  </div>
  <div class="card">
  <div class="section-title">AI Insights</div>
  <div id="aiInsights"></div>
</div>

<div class="card">
  <div class="section-title">Discussion Topics</div>
  <ul id="topicList"></ul>
</div>
  <!-- Comments -->

  <div class="card">

    <div class="section-title">Top Comments</div>

    <ul id="commentList" class="comment-list"></ul>

  </div>

  <!-- Charts -->

  <div class="card">

    <div class="section-title">Sentiment Distribution</div>

    <img id="sentimentChart" class="chart"/>

  </div>

  <!-- Word Cloud -->

<!-- Keyword Insights -->

<div class="card">

  <div class="section-title">Keyword Insights</div>

  <img id="wordCloud" class="chart"/>

  <div class="section-title" style="margin-top:10px;">
    Top Keywords
  </div>

  <img id="keywordChart" class="chart"/>

</div>
<div class="card">

  <div class="section-title">
    Topic Sentiment Analysis
  </div>

  <ul id="topicSentimentList"></ul>

</div>
  <div id="loading" class="loading">Analyzing comments...</div>

  <script src="popup.js"></script>

</body>
</html>
